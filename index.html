<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Containe Coffee</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/924/924514.png">

<link rel="stylesheet" href="style.css">

</head>
<body>

<header class="navbar glass">
<h1>Containè Coffee</h1>
<div class="cart">
🛒 <span id="cart-count">0</span>
</div>
</header>


<section class="menu">

<div class="menu-category">

<button data-category="coffee">Coffee</button>
<button data-category="noncoffee">Non Coffee</button>
<button data-category="tea">Tea</button>
<button data-category="snack">Snack</button>
<button data-category="signature">Signature</button>

</div>

<div id="menu-grid"></div>

</section>


<div class="menu-detail hidden">

<div class="detail-content glass">

<button class="close-detail">✕</button>

<img id="detail-img">

<h3 id="detail-name"></h3>

<p id="detail-desc"></p>

<p id="detail-price"></p>

<button class="add-cart">Add To Cart</button>

</div>

</div>


<a id="whatsapp-order" class="whatsapp-btn glass">
Order WhatsApp
</a>

<script src="script.js"></script>

</body>
</html>
